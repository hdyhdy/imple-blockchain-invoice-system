# FISCO BCOS 配置文件

# 节点连接信息
[network]
# 节点列表
peers=127.0.0.1:20200,127.0.0.1:20201

# 链ID
chain.id=1

# 群组ID
group.id=1

# 账户配置
[account]
# 账户类型: 0 - 外部账户, 1 - 内部账户
account.type=0
# 账户文件路径
account.keyfile=conf/account.key

# 交易配置
[transaction]
# 交易超时时间(ms)
timeout=30000
# 交易重试次数
retry.count=3
# 交易重试间隔(ms)
retry.interval=1000

# 日志配置
[log]
# 日志级别: debug, info, warn, error
level=info
# 日志文件路径
file=logs/sdk.log
# 日志文件大小限制(MB)
max.size=100
# 日志文件保留天数
max.days=7
